workflows:
  android_release:
    name: Android Release
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      groups:
        - firebase_files
        - android_signing
      vars:
        PROJECT_PATH: mobile
    scripts:
      - name: Prepare Firebase and Android signing files
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/android/app/google-services.json"
          echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/GoogleService-Info.plist"
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/android/codemagic.keystore"
          printf '%s\n' \
            "storeFile=$CM_BUILD_DIR/$PROJECT_PATH/android/codemagic.keystore" \
            "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
            "keyAlias=$ANDROID_KEY_ALIAS" \
            "keyPassword=$ANDROID_KEY_PASSWORD" \
            > "$CM_BUILD_DIR/$PROJECT_PATH/android/key.properties"
          plutil -lint "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/GoogleService-Info.plist"
          plutil -lint "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/Info.plist"
      - name: Install dependencies
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          flutter pub get
      - name: Build Android App Bundle
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          flutter build appbundle --release --no-tree-shake-icons
      - name: Build Android APK
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          flutter build apk --release --no-tree-shake-icons
      - name: Publish Google Play listing and internal release
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS:-}" ]; then
            echo "GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS is not configured. Skipping Google Play publication."
            exit 0
          fi

          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          bundle install
          export ANDROID_PACKAGE_NAME="${ANDROID_PACKAGE_NAME:-com.denkma.app}"
          export GOOGLE_PLAY_TRACK="${GOOGLE_PLAY_TRACK:-internal}"
          export GOOGLE_PLAY_RELEASE_STATUS="${GOOGLE_PLAY_RELEASE_STATUS:-draft}"
          export ANDROID_AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          bundle exec fastlane android upload_store_listing
          bundle exec fastlane android deploy_internal
    artifacts:
      - mobile/build/app/outputs/bundle/release/*.aab
      - mobile/build/app/outputs/flutter-apk/*.apk

  ios_release:
    name: iOS Release
    max_build_duration: 120
    integrations:
      app_store_connect: Denkmaios
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase_files
      vars:
        PROJECT_PATH: mobile
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
        BUNDLE_ID: com.denkma.app
    scripts:
      - name: Prepare Firebase files
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/android/app/google-services.json"
          echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/GoogleService-Info.plist"
          plutil -lint "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/GoogleService-Info.plist"
          plutil -lint "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/Info.plist"
      - name: Install dependencies
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          flutter pub get
      - name: Set up iOS code signing
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          xcode-project use-profiles
      - name: Build IPA
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          flutter build ipa --release
    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
