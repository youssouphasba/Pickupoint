workflows:
  android_release:
    name: Android Release
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      groups:
        - firebase_files
        - android_signing
        - google_maps
        - shorebird
        - google_play
        - release_automation
      vars:
        PROJECT_PATH: mobile
        ANDROID_COMPILE_SDK: "36"
        ANDROID_TARGET_SDK: "35"
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
    scripts:
      - name: Prepare Firebase, Maps and Android signing files
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          # echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/android/app/google-services.json"
          echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/GoogleService-Info.plist"
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/android/codemagic.keystore"
          printf '%s\n' \
            "storeFile=$CM_BUILD_DIR/$PROJECT_PATH/android/codemagic.keystore" \
            "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
            "keyAlias=$ANDROID_KEY_ALIAS" \
            "keyPassword=$ANDROID_KEY_PASSWORD" \
            > "$CM_BUILD_DIR/$PROJECT_PATH/android/key.properties"

          GOOGLE_MAPS_ANDROID_VALUE="${GOOGLE_MAPS_ANDROID_KEY:-${GOOGLE_MAPS_API_KEY_ANDROID:-${GOOGLE_MAPS_API_KEY:-}}}"
          if [ -z "$GOOGLE_MAPS_ANDROID_VALUE" ]; then
            echo "ERROR: Google Maps Android key is missing. Configure GOOGLE_MAPS_ANDROID_KEY in the google_maps group." >&2
            exit 1
          fi
          printf '%s\n' "google.maps.android.key=$GOOGLE_MAPS_ANDROID_VALUE" >> "$CM_BUILD_DIR/$PROJECT_PATH/android/local.properties"

          plutil -lint "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/GoogleService-Info.plist"
          plutil -lint "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/Info.plist"
      - name: Install dependencies
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          flutter pub get
      - name: Install Shorebird CLI
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          if ! command -v shorebird >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -fsSL https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
          fi
          echo 'export PATH="$HOME/.shorebird/bin:$PATH"' >> "$CM_ENV"
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird --version
      - name: Build Android Shorebird release
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          export PATH="$HOME/.shorebird/bin:$PATH"
          if [ -z "${SHOREBIRD_TOKEN:-}" ]; then
            echo "ERROR: SHOREBIRD_TOKEN is missing. Create a Shorebird API key in Shorebird Console > Account > API Keys, then add it to Codemagic in a secure group named shorebird." >&2
            exit 1
          fi
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          shorebird_log="$(mktemp)"
          set +e
          if [ -n "${SHOREBIRD_FLUTTER_VERSION:-}" ]; then
            shorebird release android --flutter-version="$SHOREBIRD_FLUTTER_VERSION" -- --no-tree-shake-icons 2>&1 | tee "$shorebird_log"
          else
            shorebird release android -- --no-tree-shake-icons 2>&1 | tee "$shorebird_log"
          fi
          shorebird_exit="${PIPESTATUS[0]}"
          set -e
          if [ "$shorebird_exit" -ne 0 ]; then
            if grep -Eq "existing android release for version|already exists" "$shorebird_log"; then
              if [ ! -f "build/app/outputs/bundle/release/app-release.aab" ]; then
                echo "ERROR: Shorebird release already exists, but no generated AAB was found." >&2
                exit "$shorebird_exit"
              fi
              echo "Shorebird release already exists for this Android version. Continuing with the generated AAB for Play Store upload."
            else
              exit "$shorebird_exit"
            fi
          fi
      - name: Build Android APK
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          flutter build apk --release --split-per-abi --no-tree-shake-icons
      - name: Publish Google Play listing and internal release
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          GOOGLE_PLAY_CREDENTIALS="${GCLOUD_SERVICE_ACCOUNT_CREDENTIALS:-${GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS:-}}"
          if [ -z "$GOOGLE_PLAY_CREDENTIALS" ]; then
            echo "GCLOUD_SERVICE_ACCOUNT_CREDENTIALS is not configured. Skipping Google Play publication."
            exit 0
          fi
          export GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS="$GOOGLE_PLAY_CREDENTIALS"

          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          bundle install
          export ANDROID_PACKAGE_NAME="${ANDROID_PACKAGE_NAME:-com.denkma.app}"
          export GOOGLE_PLAY_TRACK="${GOOGLE_PLAY_TRACK:-internal}"
          export GOOGLE_PLAY_RELEASE_STATUS="${GOOGLE_PLAY_RELEASE_STATUS:-draft}"
          export ANDROID_AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          bundle exec fastlane android upload_store_listing
          bundle exec fastlane android deploy_internal
          python3 "$CM_BUILD_DIR/scripts/sync_app_update_settings.py" --platform android --pubspec "$CM_BUILD_DIR/$PROJECT_PATH/pubspec.yaml"
    artifacts:
      - mobile/build/app/outputs/bundle/release/*.aab
      - mobile/build/app/outputs/flutter-apk/*.apk

  android_shorebird_patch:
    name: Android Shorebird Patch
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      groups:
        - firebase_files
        - android_signing
        - google_maps
        - shorebird
      vars:
        PROJECT_PATH: mobile
        ANDROID_COMPILE_SDK: "36"
        ANDROID_TARGET_SDK: "35"
        SHOREBIRD_ANDROID_RELEASE_VERSION: "latest"
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
    scripts:
      - name: Prepare Firebase, Maps and Android signing files
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/GoogleService-Info.plist"
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/android/codemagic.keystore"
          printf '%s\n' \
            "storeFile=$CM_BUILD_DIR/$PROJECT_PATH/android/codemagic.keystore" \
            "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
            "keyAlias=$ANDROID_KEY_ALIAS" \
            "keyPassword=$ANDROID_KEY_PASSWORD" \
            > "$CM_BUILD_DIR/$PROJECT_PATH/android/key.properties"

          GOOGLE_MAPS_ANDROID_VALUE="${GOOGLE_MAPS_ANDROID_KEY:-${GOOGLE_MAPS_API_KEY_ANDROID:-${GOOGLE_MAPS_API_KEY:-}}}"
          if [ -z "$GOOGLE_MAPS_ANDROID_VALUE" ]; then
            echo "ERROR: Google Maps Android key is missing. Configure GOOGLE_MAPS_ANDROID_KEY in the google_maps group." >&2
            exit 1
          fi
          printf '%s\n' "google.maps.android.key=$GOOGLE_MAPS_ANDROID_VALUE" >> "$CM_BUILD_DIR/$PROJECT_PATH/android/local.properties"
      - name: Install dependencies
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          flutter pub get
      - name: Install Shorebird CLI
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          if ! command -v shorebird >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -fsSL https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
          fi
          echo 'export PATH="$HOME/.shorebird/bin:$PATH"' >> "$CM_ENV"
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird --version
      - name: Patch Android with Shorebird
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          export PATH="$HOME/.shorebird/bin:$PATH"
          if [ -z "${SHOREBIRD_TOKEN:-}" ]; then
            echo "ERROR: SHOREBIRD_TOKEN is missing. Create a Shorebird API key in Shorebird Console > Account > API Keys, then add it to Codemagic in a secure group named shorebird." >&2
            exit 1
          fi
          if [ -z "${SHOREBIRD_ANDROID_RELEASE_VERSION:-}" ]; then
            echo "ERROR: SHOREBIRD_ANDROID_RELEASE_VERSION is missing. Set it to latest or an existing Android Shorebird release, for example 1.0.12+29." >&2
            exit 1
          fi
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          if [ -n "${SHOREBIRD_FLUTTER_VERSION:-}" ]; then
            shorebird patch android \
              --flutter-version="$SHOREBIRD_FLUTTER_VERSION" \
              --release-version "$SHOREBIRD_ANDROID_RELEASE_VERSION" \
              -- --no-tree-shake-icons
          else
            shorebird patch android \
              --release-version "$SHOREBIRD_ANDROID_RELEASE_VERSION" \
              -- --no-tree-shake-icons
          fi

  ios_release:
    name: iOS Release
    max_build_duration: 120
    integrations:
      app_store_connect: Denkmaios
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase_files
        - google_maps
        - shorebird
        - ios_signing
        - release_automation
      vars:
        PROJECT_PATH: mobile
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
        BUNDLE_ID: com.denkma.app
        IOS_BUILD_NAME: "1.0.19"
        IOS_BUILD_NUMBER: "38"
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Prepare Firebase and Maps files
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          # echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/android/app/google-services.json"
          echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/GoogleService-Info.plist"
          plutil -lint "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/GoogleService-Info.plist"

          GOOGLE_MAPS_IOS_VALUE="${GOOGLE_MAPS_IOS_KEY:-${GOOGLE_MAPS_API_KEY_IOS:-${GOOGLE_MAPS_API_KEY:-}}}"
          if [ -z "$GOOGLE_MAPS_IOS_VALUE" ]; then
            echo "ERROR: Google Maps iOS key is missing. Configure GOOGLE_MAPS_IOS_KEY in the google_maps group." >&2
            exit 1
          fi
          plutil -replace GoogleMapsApiKey -string "$GOOGLE_MAPS_IOS_VALUE" "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/Info.plist"
          plutil -lint "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/Info.plist"
      - name: Install dependencies
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          python3 - <<'PY'
          import os
          import pathlib
          import re

          pubspec = pathlib.Path("pubspec.yaml")
          text = pubspec.read_text(encoding="utf-8")
          build_name = os.environ["IOS_BUILD_NAME"]
          build_number = os.environ["IOS_BUILD_NUMBER"]
          updated = re.sub(
              r"^version:\s*.+$",
              f"version: {build_name}+{build_number}",
              text,
              count=1,
              flags=re.MULTILINE,
          )
          pubspec.write_text(updated, encoding="utf-8")
          print(f"Using iOS-only version override: {build_name}+{build_number}")
          PY
          flutter pub get
      - name: Install Shorebird CLI
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          if ! command -v shorebird >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -fsSL https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
          fi
          echo 'export PATH="$HOME/.shorebird/bin:$PATH"' >> "$CM_ENV"
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird --version
      - name: Set up iOS code signing
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          keychain initialize
          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            echo "ERROR: CERTIFICATE_PRIVATE_KEY is missing. Add the iOS distribution certificate private key to a secure group named ios_signing in Codemagic." >&2
            exit 1
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create --certificate-key @env:CERTIFICATE_PRIVATE_KEY
          keychain add-certificates

          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          xcode-project use-profiles --project ios/Runner.xcodeproj --custom-export-options='{"manageAppVersionAndBuildNumber":false}'
      - name: Build iOS Shorebird release
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          export PATH="$HOME/.shorebird/bin:$PATH"

          if [ -z "${SHOREBIRD_TOKEN:-}" ]; then
            echo "ERROR: SHOREBIRD_TOKEN is missing. Create a Shorebird API key in Shorebird Console > Account > API Keys, then add it to Codemagic in a secure group named shorebird." >&2
            exit 1
          fi

          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          if [ -n "${SHOREBIRD_FLUTTER_VERSION:-}" ]; then
            shorebird release ios \
              --flutter-version="$SHOREBIRD_FLUTTER_VERSION" \
              --export-options-plist=/Users/builder/export_options.plist
          else
            shorebird release ios \
              --export-options-plist=/Users/builder/export_options.plist
          fi
          python3 "$CM_BUILD_DIR/scripts/sync_app_update_settings.py" --platform ios --pubspec "$CM_BUILD_DIR/$PROJECT_PATH/pubspec.yaml"
      - name: Scan iOS private and deprecated APIs
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          bash "$CM_BUILD_DIR/scripts/scan_ios_review_apis.sh"
    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - ios-review-scan/report.txt
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration

  ios_shorebird_patch:
    name: iOS Shorebird Patch
    max_build_duration: 90
    integrations:
      app_store_connect: Denkmaios
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase_files
        - google_maps
        - shorebird
        - ios_signing
      vars:
        PROJECT_PATH: mobile
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
        BUNDLE_ID: com.denkma.app
        SHOREBIRD_IOS_RELEASE_VERSION: "1.0.17+35"
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Prepare Firebase and Maps files
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/GoogleService-Info.plist"
          plutil -lint "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/GoogleService-Info.plist"

          GOOGLE_MAPS_IOS_VALUE="${GOOGLE_MAPS_IOS_KEY:-${GOOGLE_MAPS_API_KEY_IOS:-${GOOGLE_MAPS_API_KEY:-}}}"
          if [ -z "$GOOGLE_MAPS_IOS_VALUE" ]; then
            echo "ERROR: Google Maps iOS key is missing. Configure GOOGLE_MAPS_IOS_KEY in the google_maps group." >&2
            exit 1
          fi
          plutil -replace GoogleMapsApiKey -string "$GOOGLE_MAPS_IOS_VALUE" "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/Info.plist"
          plutil -lint "$CM_BUILD_DIR/$PROJECT_PATH/ios/Runner/Info.plist"
      - name: Install dependencies
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          python3 - <<'PY'
          import os
          import pathlib
          import re

          release_version = os.environ["SHOREBIRD_IOS_RELEASE_VERSION"].strip()
          if "+" not in release_version:
              raise SystemExit(
                  "ERROR: SHOREBIRD_IOS_RELEASE_VERSION must look like 1.0.17+35."
              )

          build_name, build_number = release_version.split("+", 1)
          pubspec = pathlib.Path("pubspec.yaml")
          text = pubspec.read_text(encoding="utf-8")
          updated = re.sub(
              r"^version:\s*.+$",
              f"version: {build_name}+{build_number}",
              text,
              count=1,
              flags=re.MULTILINE,
          )
          pubspec.write_text(updated, encoding="utf-8")
          print(f"Using iOS patch version override: {build_name}+{build_number}")
          PY
          flutter pub get
      - name: Install Shorebird CLI
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          if ! command -v shorebird >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -fsSL https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
          fi
          echo 'export PATH="$HOME/.shorebird/bin:$PATH"' >> "$CM_ENV"
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird --version
      - name: Set up iOS code signing
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          keychain initialize
          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            echo "ERROR: CERTIFICATE_PRIVATE_KEY is missing. Add the iOS distribution certificate private key to a secure group named ios_signing in Codemagic." >&2
            exit 1
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create --certificate-key @env:CERTIFICATE_PRIVATE_KEY
          keychain add-certificates

          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          xcode-project use-profiles --project ios/Runner.xcodeproj --custom-export-options='{"manageAppVersionAndBuildNumber":false}'
      - name: Patch iOS with Shorebird
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          export PATH="$HOME/.shorebird/bin:$PATH"

          if [ -z "${SHOREBIRD_TOKEN:-}" ]; then
            echo "ERROR: SHOREBIRD_TOKEN is missing. Create a Shorebird API key in Shorebird Console > Account > API Keys, then add it to Codemagic in a secure group named shorebird." >&2
            exit 1
          fi
          if [ -z "${SHOREBIRD_IOS_RELEASE_VERSION:-}" ]; then
            echo "ERROR: SHOREBIRD_IOS_RELEASE_VERSION is missing. Set it to an existing iOS Shorebird release, for example 1.0.11+27." >&2
            exit 1
          fi

          cd "$CM_BUILD_DIR/$PROJECT_PATH"
          if [ -n "${SHOREBIRD_FLUTTER_VERSION:-}" ]; then
            shorebird patch ios \
              --flutter-version="$SHOREBIRD_FLUTTER_VERSION" \
              --release-version "$SHOREBIRD_IOS_RELEASE_VERSION" \
              --export-options-plist /Users/builder/export_options.plist
          else
            shorebird patch ios \
              --release-version "$SHOREBIRD_IOS_RELEASE_VERSION" \
              --export-options-plist /Users/builder/export_options.plist
          fi
